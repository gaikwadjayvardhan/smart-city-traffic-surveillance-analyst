version: "1.0"
name: "smart-city-traffic-surveillance-analyst"
description: "OpenEnv-compliant environment for evaluating AI traffic surveillance agents on collision detection, near-miss identification, and emergency dispatch tasks."

entry_point: "app:make_app"

author: "Traffic Surveillance Team"
license: "MIT"
url: "https://huggingface.co/spaces/gaikwadjayvardhan/smart-city-traffic-surveillance-analyst"

tasks:
  - id: "collision_tagging"
    name: "Collision Tagging"
    description: "Scan 30 frames and identify the exact frame where two vehicles collide (bounding boxes overlap, speeds drop to zero)."
    difficulty: "easy"

  - id: "near_miss_detection"
    name: "Near-Miss Detection"
    description: "Analyse vehicle trajectory data to identify the vehicle that breached a 10-metre safety radius without colliding."
    difficulty: "medium"

  - id: "active_incident_management"
    name: "Active Incident Management"
    description: "Multi-vehicle crash: tag collision, dispatch EMS to correct coordinates, update upstream warning signs."
    difficulty: "hard"

observation_space: "TrafficObservation"
action_space: "TrafficAction"
reward_space: "Reward"

endpoints:
  health:  /healthz
  reset:   /reset
  step:    /step
  state:   /state
  grade:   /grader

scoring:
  reward_range: [0.01, 0.989]
  success_threshold: 0.98
  score_formula: mean(step_rewards)
